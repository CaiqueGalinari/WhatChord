<!-- 90% da parte visual -->
<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>WhatChord</title>

    <!-- ----------------------------
            BLOCO DO CSS
    --------------------------------- -->
    <style>
      /* Variáveis globais */
      :root {
        /* Cores de fundo, etc */
        --bg-app: #0a1014;
        --bg-panel: #111b21;
        --bg-hover: #202c33;
        --bg-input: #2a3942;
        --text-primary: #e9edef;
        --text-secondary: #8696a0;
        --accent: #00a884;
        --border: #222d34;
      }

      /* Tira toda a formatação do HTML */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      /* Base */
      body {
        background-color: var(--bg-app);
        color: var(--text-primary);
        height: 100vh;
        display: flex;
        overflow: hidden;
      }

      /* -----------
          LOGIN
      ------------ */
      .login-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(10, 16, 20, 0.95);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }
      .login-box {
        background-color: var(--bg-panel);
        padding: 40px;
        border-radius: 10px;
        text-align: center;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        width: 350px;
      }
      .login-box h2 {
        margin-bottom: 10px;
        color: var(--text-primary);
      }
      .login-box p {
        margin-bottom: 20px;
        color: var(--text-secondary);
        font-size: 14px;
      }
      .login-box input {
        width: 100%;
        padding: 12px;
        margin-bottom: 20px;
        border-radius: 5px;
        border: 1px solid var(--border);
        background-color: var(--bg-input);
        color: var(--text-primary);
        outline: none;
      }
      .login-box button {
        background-color: var(--accent);
        color: var(--bg-app);
        border: none;
        padding: 12px;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
        width: 100%;
        font-size: 16px;
      }

      .login-box .btn-outline {
        background-color: transparent;
        border: 1px solid var(--accent);
        color: var(--accent);
        margin-top: 10px;
      }
      .login-box .btn-outline:hover {
        background-color: rgba(0, 168, 132, 0.1);
      }

      .hidden {
        display: none !important;
      }

      /* Estrutura Base */
      .sidebar-icons {
        width: 60px;
        background-color: var(--bg-panel);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 10px;
      }
      .icon-placeholder {
        width: 32px;
        height: 32px;
        background-color: var(--bg-hover);
        border-radius: 50%;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-secondary);
        font-size: 12px;
      }
      .sidebar-chats {
        width: 340px;
        background-color: var(--bg-panel);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
      }
      .sidebar-header {
        padding: 15px 20px;
        font-size: 20px;
        font-weight: 600;
        border-bottom: 1px solid var(--border);
      }
      .search-bar {
        padding: 10px;
        border-bottom: 1px solid var(--border);
      }
      .search-bar input {
        width: 100%;
        padding: 8px 15px;
        border-radius: 8px;
        background-color: var(--bg-input);
        border: none;
        color: var(--text-primary);
        outline: none;
      }
      .chat-list {
        flex: 1;
        overflow-y: auto;
      }
      .chat-item {
        padding: 15px;
        display: flex;
        align-items: center;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
      }
      .avatar {
        width: 45px;
        height: 45px;
        background-color: var(--text-secondary);
        border-radius: 50%;
        margin-right: 15px;
      }
      .chat-info {
        flex: 1;
      }
      .chat-name {
        font-size: 16px;
        margin-bottom: 3px;
      }
      .chat-preview {
        font-size: 13px;
        color: var(--text-secondary);
      }

      /* Bolinha de notificação */
      .unread-indicator {
        width: 10px;
        height: 10px;
        background-color: var(--accent);
        border-radius: 50%;
        margin-left: auto;
        display: none;
      }
      .has-unread .unread-indicator {
        display: block;
      }

      /* Chat */
      .main-chat {
        flex: 1;
        display: flex;
        flex-direction: column;
        background-color: #0b141a;
        position: relative;
      }

      /* Tela de boas-vindas */
      .welcome-screen {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: var(--text-secondary);
      }
      .welcome-screen h1 {
        margin-bottom: 10px;
        font-weight: 300;
        color: var(--text-primary);
      }

      .chat-header {
        height: 60px;
        background-color: var(--bg-panel);
        display: flex;
        align-items: center;
        padding: 0 20px;
        border-bottom: 1px solid var(--border);
      }
      #chat {
        flex: 1;
        padding: 20px 5%;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      #chat div {
        background-color: var(--bg-panel);
        padding: 8px 12px;
        border-radius: 8px;
        max-width: 65%;
        width: fit-content;
        font-size: 14.5px;
        line-height: 1.4;
        box-shadow: 0 1px 0.5px rgba(11, 20, 26, 0.13);
      }
      #chat div strong {
        display: block;
        font-size: 12px;
        color: var(--accent);
        margin-bottom: 4px;
      }
      .input-group {
        background-color: var(--bg-panel);
        padding: 10px 20px;
        display: flex;
        gap: 10px;
        align-items: center;
      }
      #mensagem {
        flex: 1;
        padding: 12px 15px;
        border-radius: 8px;
        background-color: var(--bg-input);
        border: none;
        color: var(--text-primary);
        font-size: 15px;
        outline: none;
      }
      #btnEnviar {
        background-color: var(--accent);
        color: var(--bg-app);
        border: none;
        padding: 10px 20px;
        border-radius: 24px;
        font-weight: bold;
        cursor: pointer;
      }
    </style>
    <!-- ----------------
          FIM DO CSS
    ----------------- -->
  </head>
  <body>
    <!-- OVERLAY DE LOGIN -->
    <div id="loginOverlay" class="login-overlay">
      <div class="login-box">
        <h2>WhatChord</h2>
        <p>Identifique-se ou crie sua conta.</p>

        <!-- Bloco para o js injetar mensagens de erro -->
        <div
          id="statusMessage"
          style="
            color: #ef5350;
            font-size: 13.5px;
            margin-bottom: 12px;
            min-height: 16px;
            font-weight: 500;
          "
        ></div>

        <input
          type="text"
          id="nicknameInput"
          placeholder="Digite seu apelido..."
          autocomplete="off"
        />

        <!-- Campo de senha -->
        <input
          type="password"
          id="passwordInput"
          placeholder="Digite sua senha..."
        />

        <!-- Botão de login -->
        <button id="btnLogin">Entrar</button>
        <!-- Botão de cadastro -->
        <button id="btnRegister" class="btn-outline">Cadastrar</button>
      </div>
    </div>

    <!-- Ícones, imitando o whatsapp web -->
    <nav class="sidebar-icons">
      <div class="icon-placeholder">Msg</div>
    </nav>

    <!-- Complemento à NAV anterior, vai listar os users -->
    <aside class="sidebar-chats">
      <div class="sidebar-header">WhatChord</div>
      <div class="search-bar">
        <input type="text" placeholder="Pesquisar contatos..." />
      </div>
      <div class="chat-list"></div>
    </aside>

    <main class="main-chat">
      <!-- Tela Inicial -->
      <div id="welcomeScreen" class="welcome-screen">
        <h1>WhatChord para Redes</h1>
        <p>
          Envie e receba mensagens através de Sockets TCP puros.<br /><br />Selecione
          um contato na lista lateral para iniciar.
        </p>
      </div>

      <!-- Componentes do Chat (Iniciam ocultos pela classe "hidden") -->
      <header class="chat-header hidden" id="chatHeader">
        <div class="chat-name">Chat</div>
      </header>
      <div id="chat" class="hidden"></div>
      <div class="input-group hidden" id="chatInputGroup">
        <input type="text" id="mensagem" placeholder="Digite uma mensagem..." />
        <button id="btnEnviar">Enviar</button>
      </div>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
